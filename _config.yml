# Jekyll config for the GaariLog public site, served via GitHub Pages.
#
# Canonical source is `web/` in the private `akagr/car-log-app` repo. This
# folder is mirrored to the public `akagr/gaarilog-site` repo via
# `tool/publish-site.sh`, which wraps `git subtree push`. GitHub Pages on
# the public repo serves from `main` branch, root folder.
#
# The dev-side docs (todo.md, decisions.md, week-N-plan.md, mvp.md) live
# under /docs in the source repo and are intentionally NOT mirrored here.

title: GaariLog
description: A car service & expense tracker for Indian vehicle owners. Local-only, no cloud, no tracking.
theme: minima

# baseurl is the path the site lives at on github.io. The public mirror is
# https://akagr.github.io/gaarilog-site/ — so baseurl is /gaarilog-site.
baseurl: "/gaarilog-site"
url: "https://akagr.github.io"

# minima theme footer links — the theme renders these in a sidebar/footer
minima:
  date_format: "%Y-%m-%d"

# GitHub Pages applies a safe-mode include list by default. The `web/` folder
# contains only the files we want published; nothing under /docs, /lib, /test,
# /android, /ios is even visible to Jekyll because Pages reads from /web.

# Plugins available on GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag